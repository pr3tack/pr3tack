title: PR3TACK PT05.002 — Credential Store Forging — Kerberos Ticket with Anomalous Lifetime
id: f2a3b4c5-d6e7-8901-fabc-012345678901
status: experimental
description: >
  Detects Kerberos service ticket requests (Event ID 4769) with ticket lifetimes,
  encryption types, or renewable lifetimes inconsistent with the domain controller
  policy — indicative of forged Kerberos ticket injection (golden/silver ticket).
  Adversaries plant forged credential material in OS credential stores for later
  retrieval by privileged processes, achieving privilege escalation through
  legitimate OS authentication flows rather than direct exploitation.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/analytics/PT05.002-credential-store-forging.md
  - https://attack.mitre.org/techniques/T1558/
  - https://adsecurity.org/
author: PR3TACK
date: 2026/06/09
tags:
  - attack.privilege_escalation
  - attack.credential_access
  - attack.t1558.001
  - pr3tack.PT05
  - pr3tack.PT05.002
logsource:
  product: windows
  service: security
detection:
  selection_golden:
    EventID: 4769
    TicketEncryptionType:
      - '0x17'  # RC4-HMAC — weak, suspicious if AES policy enforced
      - '0x18'  # RC4-HMAC-EXP
  selection_lifetime:
    EventID: 4769
    TicketOptions|contains: '0x40810000'  # Renewable + pre-auth not required
  condition: selection_golden or selection_lifetime
falsepositives:
  - Legacy systems requiring RC4 encryption that have not been migrated to AES
  - Cross-forest trusts with older encryption type requirements
level: high
fields:
  - SubjectUserName
  - ServiceName
  - TicketEncryptionType
  - TicketOptions
  - IpAddress
  - EventID

title: PR3TACK T1015.001 — Security Stack Fingerprinting via DNS Enumeration of Vendor CNAMEs
id: b8e2d547-9c3f-4a1b-8d7e-3f6a9b2c5e81
status: experimental
description: >
  Detects a high volume of DNS queries from a single external source targeting corporate
  subdomains, where resolved CNAMEs point to known security vendor infrastructure
  (Zscaler, Netskope, Cloudflare Gateway, Palo Alto Prisma, Microsoft MCAS).
  This pattern is consistent with automated adversarial security-stack fingerprinting
  used to tailor bypass techniques before a primary attack.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/rules/T1015.001-cspm-signature-leakage.md
  - https://attack.mitre.org/techniques/T1590/
author: PR3TACK
date: 2026/05/19
modified: 2026/05/19
tags:
  - attack.reconnaissance
  - attack.t1590
  - pr3tack.TA01
  - pr3tack.T1015.001
logsource:
  category: dns
  product: generic
detection:
  selection_volume:
    src_ip|not_private: true
  selection_cname:
    answer|contains:
      - '.zscaler.net'
      - '.zscalerone.net'
      - '.zscalertwo.net'
      - '.zscalerthree.net'
      - '.netskope.com'
      - '.gateway.zscaler.net'
      - '.prismaaccess.com'
      - '.mcas.ms'
      - '.cloudflare-gateway.com'
      - '.ibosscloud.com'
  timeframe: 10m
  condition: selection_volume | count(query) by src_ip > 50
falsepositives:
  - Legitimate bulk DNS resolution by internal monitoring or IPAM tools
  - Authorised external DNS auditing or EASM scanning tools
  - Recursive resolvers performing normal lookups on behalf of many clients
level: medium
fields:
  - src_ip
  - query
  - answer
  - query_type
  - rcode

title: PR3TACK PT01.001 — SaaS Tenant Footprinting via Unauthenticated Endpoint Enumeration
id: a3f7c821-4d2e-4b1a-9f3c-8e5d2a1b7c94
status: experimental
description: >
  Detects high-frequency unauthenticated requests to SaaS OIDC discovery,
  SCIM provisioning, and login endpoints from a single source IP. This pattern
  is consistent with automated SaaS tenant footprinting — mapping a target's
  cloud application surface without triggering authenticated-session monitoring.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/rules/PT01.001-saas-tenant-footprinting.md
  - https://attack.mitre.org/techniques/T1595/
author: PR3TACK
date: 2026/05/19
modified: 2026/05/19
tags:
  - attack.reconnaissance
  - attack.t1595
  - pr3tack.PT01
  - pr3tack.PT01.001
logsource:
  category: webserver
  product: generic
detection:
  selection:
    cs-uri-stem|contains:
      - '/.well-known/openid-configuration'
      - '/.well-known/oauth-authorization-server'
      - '/scim/v2'
      - '/oauth2/v1/authorize'
      - '/oauth2/v1/userinfo'
      - '/.well-known/webfinger'
    sc-status:
      - 200
      - 401
      - 403
    cs-username: '-'
  timeframe: 5m
  condition: selection | count() by c-ip > 20
falsepositives:
  - Legitimate OIDC federation configuration by IT or IAM teams
  - Authorised EASM tools (Shodan, Censys, Qualys)
  - Automated integration health checks from known monitoring IPs
level: medium
fields:
  - c-ip
  - cs-uri-stem
  - sc-status
  - cs-host
  - cs-user-agent
  - cs-bytes

title: PR3TACK PT01.004 — Decommissioned IAM Role AssumeRole Attempt (Ghost Role Squatting)
id: d7b3e291-5f8a-4d2c-b6e9-1a4c8f3d7b52
status: experimental
description: >
  Detects sts:AssumeRole or equivalent IAM impersonation calls targeting role ARNs
  or service account names that are present on a maintained watchlist of decommissioned
  identities. This is a high-fidelity indicator of ghost-role squatting — where an
  adversary re-registers a trusted identity name that internal systems still expect to
  exist, enabling lateral movement via trusted-name exploitation.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/rules/PT01.004-identity-role-squatting-prep.md
  - https://attack.mitre.org/techniques/T1078/004/
author: PR3TACK
date: 2026/05/19
modified: 2026/05/19
tags:
  - attack.reconnaissance
  - attack.credential_access
  - attack.t1078.004
  - pr3tack.PT01
  - pr3tack.PT01.004
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventName:
      - 'AssumeRole'
      - 'AssumeRoleWithWebIdentity'
      - 'AssumeRoleWithSAML'
    requestParameters.roleArn|contains:
      # Populate from your decommissioned role tombstone registry.
      # Use naming convention patterns that match decommissioned roles in your environment.
      - ':role/DECOMMISSIONED-'
      - ':role/DEPRECATED-'
      - ':role/LEGACY-'
      - ':role/OLD-'
      - ':role/DELETED-'
  condition: selection
falsepositives:
  - Automated scripts referencing stale role ARNs that have not yet been updated
  - IAM permission boundary tests conducted by the security team
  - Infrastructure-as-code drift where Terraform still references deleted roles
level: high
fields:
  - userIdentity.arn
  - userIdentity.accountId
  - requestParameters.roleArn
  - requestParameters.roleSessionName
  - sourceIPAddress
  - userAgent
  - awsRegion
  - eventTime

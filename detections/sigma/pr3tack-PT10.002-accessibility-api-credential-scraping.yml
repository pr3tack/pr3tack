title: PR3TACK PT10.002 — Credential Cache Scraping via Accessibility APIs — Non-AT Process Accessing Sensitive App UI
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: experimental
description: >
  Detects a process without a legitimate assistive technology use case calling
  Windows UI Automation APIs to access the UI element tree of sensitive applications
  — password managers, authenticator apps, and browsers. Unlike keylogging, this
  technique reads credential values directly from application UI state, capturing
  auto-filled passwords, displayed TOTP codes, and session tokens without intercepting
  input events. Requires ETW-based UI Automation API monitoring.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/rules/PT10.002-credential-cache-scraping-accessibility-apis.md
  - https://learn.microsoft.com/en-us/dotnet/framework/ui-automation/ui-automation-overview
author: PR3TACK
date: 2026/06/09
tags:
  - attack.collection
  - attack.t1056.002
  - pr3tack.PT10
  - pr3tack.PT10.002
logsource:
  category: process_access
  product: windows
detection:
  selection:
    api_call|contains:
      - 'IUIAutomation'
      - 'UIA_'
      - 'FindAll'
      - 'ElementFromPoint'
    target_process_name|contains:
      - '1Password'
      - 'Bitwarden'
      - 'KeePass'
      - 'Authy'
      - 'chrome'
      - 'firefox'
      - 'msedge'
  filter_assistive_tech:
    Image|contains:
      - 'nvda.exe'
      - 'JAWS'
      - 'ZoomText'
      - 'narrator.exe'
      - 'magnify.exe'
      - 'ScreenReader'
  condition: selection and not filter_assistive_tech
falsepositives:
  - Enterprise accessibility solutions not listed in the filter
  - UI testing frameworks (Selenium, Playwright) running automated tests
  - RPA (Robotic Process Automation) tools with legitimate use case
level: high
fields:
  - Image
  - ProcessId
  - target_process_name
  - api_call
  - HostName
  - User

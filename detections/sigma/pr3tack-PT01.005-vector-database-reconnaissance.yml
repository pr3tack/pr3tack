title: PR3TACK PT01.005 — Unauthenticated Access to Vector Database Endpoint
id: d4a9c182-7f3e-4b5a-c263-8a1f6d4e2b37
status: experimental
description: >
  Detects any unauthenticated request to a vector database search or collection
  endpoint that receives a successful response. Unauthenticated access to a vector
  database is always a critical finding regardless of query volume, as it indicates
  the database is publicly reachable without authentication controls — exposing all
  stored embeddings and associated metadata to enumeration.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/rules/PT01.005-vector-database-reconnaissance.md
  - https://qdrant.tech/documentation/guides/security/
  - https://weaviate.io/developers/weaviate/configuration/authentication
author: PR3TACK
date: 2026/06/09
modified: 2026/06/09
tags:
  - attack.reconnaissance
  - attack.t1590
  - pr3tack.PT01
  - pr3tack.PT01.005
logsource:
  category: webserver
  product: generic
detection:
  selection:
    cs-uri-stem|contains:
      - '/collections/'
      - '/points/search'
      - '/query'
      - '/vectors/search'
    cs-username: '-'
    sc-status:
      - 200
      - 206
  condition: selection
falsepositives:
  - Internal health-check probes on unauthenticated endpoints (should be remediated)
level: critical
fields:
  - c-ip
  - cs-uri-stem
  - sc-status
  - cs-user-agent

title: PR3TACK PT02.001 — AI-Generated Persona Synthesis — Critical Threshold Escalation
id: b8d4f162-3e9c-4a7b-c285-1f6e8b2d4a71
status: experimental
description: >
  Detects inbound identity submissions scoring ≥ 70 on the PR3TACK synthetic identity
  scoring model, indicating a high-confidence synthetic persona. Identities at this threshold
  should be escalated to CISO/Legal and zero-trust onboarding protocols applied. A score ≥ 90
  should result in immediate access denial pending investigation.
  
  Key high-weight signals include: AI-generated profile photo (score +30), cross-platform
  inconsistencies (score +25), no reverse image match (score +25), and recently registered
  email domain (score +20). A score ≥ 70 requires at least three of these high-weight
  indicators to be present simultaneously.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/analytics/PT02.001-ai-generated-persona-synthesis.md
  - https://github.com/pr3tack/pr3tack/blob/main/detections/hunting/PT02.001-ai-generated-persona-synthesis.md

title: PR3TACK PT02.001 — AI-Generated Persona Synthesis — Synthetic Identity Risk Score Threshold
id: a3c7e291-5f4b-4d8a-b162-7e9f3a1c5d84
status: experimental
description: >
  Detects inbound contractor, vendor, or external collaborator identity submissions that
  exceed the PR3TACK synthetic identity risk score threshold. The scoring model aggregates
  multiple weak signals — AI-generated profile photo, recently created accounts, unverifiable
  employment history, cross-platform inconsistencies, and AI-written communications — into a
  composite risk score. A score ≥ 40 triggers a Security review flag; ≥ 70 triggers escalation.
  This rule fires when the composite score is written to the identity governance or HR system
  event log by the scoring integration.
references:
  - https://github.com/pr3tack/pr3tack/blob/main/detections/analytics/PT02.001-ai-generated-persona-synthesis.md
  - https://github.com/pr3tack/pr3tack/blob/main/detections/hunting/PT02.001-ai-generated-persona-synthesis.md
  - https://thehive.ai/
  - https://www.aiornot.com/
author: PR3TACK
date: 2026/06/09
modified: 2026/06/09
tags:
  - attack.resource_development
  - attack.t1585
  - attack.t1585.001
  - pr3tack.PT02
  - pr3tack.PT02.001
logsource:
  category: application
  product: identity_governance
detection:
  selection_review:
    event_type: 'synthetic_identity_score'
    composite_score|gte: 40
  condition: selection_review
falsepositives:
  - Legitimate candidates who use AI writing assistance tools (elevates writing_style_ai_score)
  - Professionals who deliberately maintain minimal social media presence
  - Candidates from regions with limited LinkedIn penetration (low connection count baseline)
  - New graduates with limited professional history and few connections
level: medium
fields:
  - identity_id
  - identity_name
  - submission_type
  - composite_score
  - photo_ai_generated_confidence
  - linkedin_account_age_days
  - email_domain_age_days
  - unverifiable_employer_count
  - writing_style_ai_score
